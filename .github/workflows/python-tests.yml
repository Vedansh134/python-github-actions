name: python-calulator-test
on :
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

jobs:
    tests:
        runs-on: ubuntu:latest

        steps:
            - name: Get Code from github
              uses: actions/checkout@v3

            - name: Setup Python
              uses: actions/setup-python@v4
              with:
                python-version: "3.10"

            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                if [ -f requirements.txt ]; then pip install requirements.txt; fi
            
            - name: Run tests
              run: python test_calulator.py

            - name: validation
              if: success()
              run: "All tests pass successfully!!"